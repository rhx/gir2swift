name: Homebrew Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example 18.0.0)"
        required: true

jobs:
  build-bottles:
    name: Build Bottles
    uses: ./.github/workflows/build-bottles.yml
    with:
      tag: ${{ github.event.inputs.tag || github.ref_name }}
    secrets: inherit

  update-formula:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [build-bottles]
    steps:
      - name: Checkout gir2swift
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate checksums and update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION"

          wget -q "https://github.com/rhx/gir2swift/archive/refs/tags/${TAG}.tar.gz" -O source.tar.gz
          SOURCE_SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "SOURCE_SHA256=$SOURCE_SHA256"

          mkdir -p bottles
          gh release download "${TAG}" --repo rhx/gir2swift --pattern "gir2swift-*.bottle.tar.gz" -D bottles/ || true

          MACOS_ARM64_SHA256=""
          LINUX_X86_64_SHA256=""

          if [ -f "bottles/gir2swift-${VERSION}.arm64_sequoia.bottle.tar.gz" ]; then
            MACOS_ARM64_SHA256=$(sha256sum "bottles/gir2swift-${VERSION}.arm64_sequoia.bottle.tar.gz" | cut -d' ' -f1)
          fi

          if [ -f "bottles/gir2swift-${VERSION}.x86_64_linux.bottle.tar.gz" ]; then
            LINUX_X86_64_SHA256=$(sha256sum "bottles/gir2swift-${VERSION}.x86_64_linux.bottle.tar.gz" | cut -d' ' -f1)
          fi

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/rhx/homebrew-tap.git homebrew-tap
          cd homebrew-tap
          mkdir -p Formula

          python3 - "$TAG" "$VERSION" "$SOURCE_SHA256" "$MACOS_ARM64_SHA256" "$LINUX_X86_64_SHA256" <<'PYEOF'
          import sys
          tag, version, source_sha, macos_sha, linux_sha = sys.argv[1:]

          lines = []
          lines.append('class Gir2swift < Formula')
          lines.append('  desc "A simple GIR parser in Swift for creating Swift types for a .gir file"')
          lines.append('  homepage "https://github.com/rhx/gir2swift"')
          lines.append(f'  url "https://github.com/rhx/gir2swift/archive/refs/tags/{tag}.tar.gz"')
          lines.append(f'  sha256 "{source_sha}"')
          lines.append('  license "BSD-2-Clause"')
          lines.append('  env :std')
          lines.append('  head "https://github.com/rhx/gir2swift.git", branch: "main"')
          lines.append('')

          if macos_sha or linux_sha:
              lines.append('  bottle do')
              lines.append(f'    root_url "https://github.com/rhx/gir2swift/releases/download/{tag}"')
              if macos_sha:
                  lines.append(f'    sha256 cellar: :any_skip_relocation, arm64_sequoia: "{macos_sha}"')
              if linux_sha:
                  lines.append(f'    sha256 cellar: :any_skip_relocation, x86_64_linux:  "{linux_sha}"')
              lines.append('  end')
              lines.append('')

          lines += [
              '  depends_on "gobject-introspection"',
              '  depends_on "libxml2"',
              '  depends_on "pkgconf" => :build',
              '',
              '  on_macos do',
              '    depends_on :xcode => ["26.0", :build]',
              '  end',
              '',
              '  on_linux do',
              '    original_path = ENV["HOMEBREW_PATH"] || ENV["PATH"]',
              '    swift_found = original_path.split(File::PATH_SEPARATOR).any? do |dir|',
              '      File.exist?(File.join(dir, "swift"))',
              '    end',
              '    depends_on "swift" => :build unless swift_found',
              '  end',
              '',
              '  def install',
              '    original_path = ENV["HOMEBREW_PATH"] || ENV["PATH"]',
              '    swift_dir = original_path.split(File::PATH_SEPARATOR).find do |dir|',
              '      File.exist?(File.join(dir, "swift"))',
              '    end',
              '',
              '    if swift_dir && swift_dir.include?("swiftly")',
              '      ENV["SWIFTLY_BIN_DIR"] = swift_dir',
              '      ENV["SWIFTLY_HOME_DIR"] = File.dirname(swift_dir)',
              '    end',
              '',
              '    system "swift", "build", "--disable-sandbox", "-c", "release"',
              '    bin.install ".build/release/gir2swift"',
              '  end',
              '',
              '  test do',
              '    system "#{bin}/gir2swift", "--help"',
              '  end',
              'end',
          ]

          with open('Formula/gir2swift.rb', 'w') as f:
              f.write('\n'.join(lines) + '\n')

          print('Formula written successfully.')
          PYEOF

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add Formula/gir2swift.rb
          git commit -m "Update gir2swift to ${TAG}" -m "Release includes pre-built bottles for macOS and Linux"
          git push origin main
