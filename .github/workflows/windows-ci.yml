name: Windows CI

on:
  workflow_dispatch:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]
    paths:
      - ".github/workflows/windows-ci.yml"
      - "Package.swift"
      - "Sources/**"
      - "Tests/**"

jobs:
  build-windows:
    name: Windows (Swift ${{ matrix.swift }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - swift: "6.2"
            swift-tag: "swift-6.2-release"
            swift-build: "6.2-RELEASE"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: ${{ matrix.swift-tag }}
          swift-build: ${{ matrix.swift-build }}
          cache: true

      - name: Install MSYS2 libxml2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          release: true
          install: >-
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-pkgconf

      - name: Configure pkg-config
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PKG_CONFIG_PATH=C:\msys64\mingw64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Swift version
        run: swift --version

      - name: pkg-config version
        shell: pwsh
        run: pkg-config --modversion libxml-2.0

      - name: Build
        run: swift build --build-tests

      - name: Run tests
        run: swift test
