name: macOS

# Dependencies of this package
env:
  MACOS_BREW: ${{ 'libxml2 gobject-introspection pkg-config' }}

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS (Xcode ${{ matrix.xcode }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            xcode: "16.3"
          - os: macos-14
            xcode: "16.2"
    steps:
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Print macOS and Swift version
        run: |
          uname -a
          swift --version

      - name: Fetch macOS dependencies
        run: |
          brew install $MACOS_BREW
          mv /Library/Developer/CommandLineTools /Library/Developer/CommandLineTools.orig || sudo mv /Library/Developer/CommandLineTools /Library/Developer/CommandLineTools.orig

      - name: Checkout gir2swift
        uses: actions/checkout@v4
        with:
          path: gir2swift

      - name: Build gir2swift
        run: |
          cd gir2swift
          swift build

      - name: Test gir2swift
        run: |
          cd gir2swift
          swift test
