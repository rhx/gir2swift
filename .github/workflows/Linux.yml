name: Linux

# Dependencies of this package
env:
  UBUNTU_APT: ${{ 'libxml2-dev gobject-introspection libgirepository1.0-dev' }}

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: ${{ matrix.os }} (Swift ${{ matrix.swift }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            swift: "6.1"
          - os: ubuntu-22.04
            swift: "6.1"
          - os: ubuntu-22.04
            swift: "5.10.1"
    steps:
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}

      - name: Print Linux and Swift version
        run: |
          lsb_release -d
          swift --version

      - name: Fetch Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $UBUNTU_APT

      - name: Checkout gir2swift
        uses: actions/checkout@v4
        with:
          path: gir2swift

      - name: Build gir2swift
        run: |
          cd gir2swift
          swift build

      - name: Test gir2swift
        run: |
          cd gir2swift
          swift test
